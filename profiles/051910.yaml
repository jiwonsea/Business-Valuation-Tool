news_key_issues: '# LG화학 밸류에이션 영향 핵심 이슈


  ## 사업 포트폴리오

  - [기회] 여성건강 사업 강화: 일본 자궁내막증 치료제 ''디나게스트'' 도입 계약 (4월 3일)

  - [기회] 바이오 사업 확대를 통한 고부가가치 사업 강화 (4월 3일)


  ## 석유화학 부문

  - [리스크] 중동 사태로 나프타 수급 차질 및 석유화학 구조개편 ''골든타임'' 축소 (4월 4일)

  - [리스크] 석유화학 업계 45% 공장 일부 가동 중단, 4월 가동률 60%대 수준 (4월 3일)

  - [기회] 정부 2.6조 긴급수혈 및 나프타 수급 지원으로 합성수지 공급가 인상폭 완화 (4월 3~4일)


  ## 기업지배구조

  - [개선] 사외이사 의장 앞세운 거버넌스 혁신 추진 (4월 4일)


  ## 경영 방향

  - [긍정] CEO 김동춘의 ''불황 극복'' 선언 및 고부가사업 강화 전략 (4월 3일)'
