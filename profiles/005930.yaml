  - [긍정] 메모리 가격 폭등으로 1분기 영업익 50조원 초과 달성 예상 - 역대급 어닝 서프라이즈 (2026-04-04)


  - [긍정] DS부문 90여 협력사와 상생협력 강화로 공급망 안정성 개선 (2026-04-04)


  - [리스크] 미국 버라이즌 소송에서 공동 특허침해 피소로 법적 분쟁 노출 (2026-04-04)


  - [기회] 모션센서 관련 NPE와의 법적 분쟁 합의로 소송 리스크 일단락 (2026-04-04)


  - [리스크] 갤럭시 S26 FE에 구형 엑시노스 탑재 검토로 경쟁력 약화 우려 (2026-04-04)


  - [리스크] 외국인 투자자 35조원 순매도 지속 - ''셀 코리아'' 장기화로 주가 약세 (2026-04-04)


  - [기회] AI 기능 탑재 스마트폰·가전 등 신제품 라인업 강화로 프리미엄 시장 확대 (2026-04-04)'
news_drivers:
- id: memory_supercycle
  name: 메모리 가격 폭등 및 역대급 실적
  category: industry
  effects:
    growth_adj_pct: 25
