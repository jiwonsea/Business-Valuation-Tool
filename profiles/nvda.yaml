    demand.
- name: Marvell Technology
  segment_code: SEG1
  ev_ebitda: 14.8
  notes: Data center storage, networking, and semiconductor IP. Serves similar HPC/cloud
    infrastructure markets. 2024 EV/EBITDA ~14-15x.
- name: Intel Corporation (Data Center Division)
  segment_code: SEG1
  ev_ebitda: 12.5
  notes: Xeon processors for data centers. Lower multiple reflects market share losses
    but still core infrastructure player. Blended 2024 EV/EBITDA ~12-13x.
- name: SK하이닉스 (SK Hynix)
  segment_code: SEG1
  ev_ebitda: 8.5
  notes: Korean semiconductor manufacturer. HBM (High Bandwidth Memory) supplier for
    AI accelerators. 2024 EV/EBITDA ~8-9x, lower due to memory cyclicality vs. logic.
- name: 삼성전자 (Samsung Electronics) - Semiconductor Division
  segment_code: SEG1
  ev_ebitda: 9.2
  notes: Korean conglomerate with foundry/memory for AI chips. Blended divisional
    multiple ~9-10x reflecting diversified portfolio.
- name: AMD Gaming (Radeon Division)
  segment_code: SEG2
  ev_ebitda: 16.8
  notes: Direct competitor in consumer discrete GPUs. Gaming console APU supplier
    (PlayStation, Xbox). 2024 blended EV/EBITDA ~16-17x.
- name: Intel Arc (Discrete GPU)
  segment_code: SEG2
  ev_ebitda: 12.3
  notes: Emerging discrete GPU competitor. Lower multiple reflects market share struggles
    and R&D investment phase. Blended Intel 2024 EV/EBITDA ~12-13x.
- name: Qualcomm Incorporated
  segment_code: SEG2
  ev_ebitda: 13.5
  notes: Mobile gaming SoC (Snapdragon). Fabless design model. 2024 EV/EBITDA ~13-14x
    reflecting mobile/gaming exposure.
- name: Sony Group Corporation (PlayStation Hardware)
  segment_code: SEG2
  ev_ebitda: 11.2
  notes: Gaming console manufacturer (PS5). Hardware-focused with software ecosystem.
    2024 blended EV/EBITDA ~11-12x, lower due to hardware margin compression.
- name: 엔씨소프트 (NCSoft)
  segment_code: SEG2
  ev_ebitda: 8.5
  notes: Korean gaming software company. Not direct GPU peer but gaming ecosystem
    player. 2024 EV/EBITDA ~8-9x reflecting software valuation.
- name: 넥슨 (Nexon)
  segment_code: SEG2
  ev_ebitda: 7.2
  notes: Korean gaming publisher. Gaming platform exposure but not hardware. 2024
    EV/EBITDA ~7-8x.
- name: Qualcomm Incorporated (Automotive SoC)
  segment_code: SEG3
  ev_ebitda: 13.5
  notes: Automotive SoC and connectivity solutions. Snapdragon Ride platform for autonomous
    vehicles. 2024 blended EV/EBITDA ~13-14x.
- name: NXP Semiconductors
  segment_code: SEG3
  ev_ebitda: 14.2
  notes: Leading automotive semiconductor supplier. Microcontrollers, connectivity,
    security for vehicles. 2024 EV/EBITDA ~14-15x reflecting automotive growth.
- name: Mobileye (Intel subsidiary)
  segment_code: SEG3
  ev_ebitda: 18.5
  notes: Autonomous driving computer vision. Spun out from Intel. 2024 EV/EBITDA ~18-19x
    reflecting high-growth autonomous vehicle market.
- name: Synopsys Inc.
  segment_code: SEG3
  ev_ebitda: 19.2
  notes: EDA/design tools for semiconductor design. Enables automotive chip development.
    2024 EV/EBITDA ~19-20x reflecting software/tools premium.
- name: 현대모비스 (Hyundai Mobis)
  segment_code: SEG3
  ev_ebitda: 6.8
  notes: Korean automotive parts supplier. Autonomous driving components. 2024 EV/EBITDA
    ~6-7x reflecting traditional auto supplier valuation.
- name: LG전자 (LG Electronics) - Automotive Display/Component
  segment_code: SEG3
  ev_ebitda: 7.5
  notes: Korean conglomerate with automotive display and component business. 2024
    blended EV/EBITDA ~7-8x.
