- name: '미디어텍 (MediaTek, TWSE: 2454)'
  segment_code: SEG2
  ev_ebitda: 11.5
  notes: 모바일 AP, IoT칩 설계. 팹리스 모델. 대만 상장사. 스마트폰 AP 경쟁사. 2024년 AI칩 수요로 배수 상승.
- name: 'AMD (Advanced Micro Devices, NASDAQ: AMD)'
  segment_code: SEG2
  ev_ebitda: 13.5
  notes: CPU, GPU, 데이터센터 프로세서. 팹리스 모델. AI/HPC 수요 강세. 고성능 시스템반도체 벤치마크.
- name: '엔비디아 (NVIDIA, NASDAQ: NVDA)'
  segment_code: SEG2
  ev_ebitda: 28.5
  notes: GPU, AI 가속기. 팹리스 모델. AI 수요 급증으로 극도로 높은 배수. 참고용(SK하이닉스 시스템반도체와 직접 비교 부적절).
- name: 삼성전자 파운드리 (분리 추정)
  segment_code: SEG2
  ev_ebitda: 9.8
  notes: 삼성전자 파운드리 사업부 EBITDA 분리 추정. 국내 시스템반도체 제조 기준. 2023년 저수익 반영.
