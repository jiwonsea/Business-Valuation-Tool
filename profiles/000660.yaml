  - [긍정] 증권가 목표주가 상향 - 160만원대 전망으로 현재 저평가 판단 (2026-04-04)


  - [리스크] 외국인 자금 이탈 심화 - 한국주식 35조 규모 순매도 진행 중 (2026-04-04)


