news_drivers:
- id: semiconductor_boom
  name: 반도체 초호황 및 외국인 투자 복귀
  category: industry
  effects:
    growth_adj_pct: 25
    wacc_adj: -0.3
    market_sentiment_pct: 15
  rationale: 반도체 업사이클은 역사적으로 3-4년 주기로 발생하며, 현재 AI/데이터센터 수요로 인한 메모리 호황이 지속. 외국인 투자
    복귀는 밸류에이션 프리미엄 확대 효과. 과거 반도체 호황기 EBITDA 증가율 20-30% 기록
- id: labor_dispute
  name: 노조 성과급 요구 및 경영 리스크
  category: company
  effects:
    growth_adj_pct: -8
    wacc_adj: 0.2
    market_sentiment_pct: -5
  rationale: 삼성전자 노조 파업은 2024년 이후 지속적 이슈. 성과급 요구는 인건비 상승으로 마진 압박 요인. 과거 대규모 노사분규 시
    운영비용 5-10% 증가 사례 존재
- id: chipflation_risk
  name: 칩플레이션 및 소비자 가격 상승
  category: macro
  effects:
    growth_adj_pct: -12
    wacc_adj: 0.4
    market_sentiment_pct: -8
  rationale: 반도체 가격 상승이 최종 제품 가격에 전가되면서 수요 둔화 우려. 2021-2022년 칩 부족 시기 가전/모바일 수요 10-15%
    감소 경험. 인플레이션 압력으로 금리 상승 리스크 증가
- id: appliance_demand
  name: 에어컨 수요 증가
  category: industry
  effects:
    growth_adj_pct: 8
    wacc_adj: 0
    market_sentiment_pct: 3
  rationale: 기후변화로 인한 냉방기기 수요 증가는 구조적 트렌드. 생활가전 부문은 삼성전자 전체 매출의 약 15% 비중으로 제한적이나 마진
    개선 효과 기대
