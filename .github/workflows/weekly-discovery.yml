name: Weekly Discovery & Valuation
# NOTE: Primary trigger is Claude Code scheduled agent (Gamma + Gmail delivery).
# This workflow serves as a fallback if the scheduled agent fails.

on:
  schedule:
    # Saturday 00:00 UTC = KST 09:00 (08:00 during DST)
    # 3+ hour buffer after US market close on Friday
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      markets:
        description: 'Target markets (comma-separated)'
        default: 'KR,US'
      max_per_market:
        description: 'Max companies per market'
        default: '5'
      dry_run:
        description: 'Discovery only, skip valuation'
        type: boolean
        default: false

jobs:
  discover-and-value:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[ai,pipeline,db]"

      - name: Run weekly discovery
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m scheduler.weekly_run \
            --markets "${{ inputs.markets || 'KR,US' }}" \
            --max-per-market "${{ inputs.max_per_market || '5' }}" \
            ${{ inputs.dry_run == true && '--dry-run' || '' }}
