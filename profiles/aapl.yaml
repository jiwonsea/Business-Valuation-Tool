  name: 폴더블 아이폰 출시 가능성
  category: company
  effects:
    growth_adj_pct: 25
    wacc_adj: -0.1
    market_sentiment_pct: 12
  rationale: 새로운 제품 카테고리 진입으로 TAM 확대 기대. 삼성 폴더블 출시 시 20-30% 프리미엄 제품 매출 증가 사례 참조. 혁신
    제품 출시는 애플 브랜드 프리미엄 강화 및 투자 리스크 감소 효과
