name: Weekly Discovery & Valuation
# Primary scheduler: Windows Task Scheduler on local PC (Sat 09:00 KST).
# GitHub-hosted runners use Azure IPs blocked by Google News RSS and Naver API.
# This workflow is kept for manual workflow_dispatch runs only.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      markets:
        description: 'Target markets (comma-separated)'
        default: 'KR,US'
      max_per_market:
        description: 'Max companies per market'
        default: '5'
      dry_run:
        description: 'Discovery only, skip valuation'
        type: boolean
        default: false

jobs:
  discover-and-value:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[ai,pipeline,db]"

      - name: Run weekly discovery
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: meta-llama/llama-3.3-70b-instruct
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: |
          python -m scheduler.weekly_run \
            --markets "${{ inputs.markets || 'KR,US' }}" \
            --max-per-market "${{ inputs.max_per_market || '5' }}" \
            ${{ inputs.dry_run == true && '--dry-run' || '' }}

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-valuation-${{ github.run_number }}
          path: valuation-results/
          retention-days: 30
          if-no-files-found: ignore
