news_drivers:
- id: europe_heatpump
  name: 유럽 히트펌프 시장 진출
  category: company
  effects:
    growth_adj_pct: 15
    wacc_adj: 0
    market_sentiment_pct: 8
  rationale: 유럽 히트펌프 시장은 연 20-30% 성장 중. LG전자의 기술력과 브랜드 인지도 고려 시 시장점유율 5-10% 확보 가능.
    역사적으로 신시장 진출 성공률 약 60%
- id: competition_pressure
  name: 쿠팡-TCL 대용량 냉장고 경쟁 심화
  category: industry
  effects:
    growth_adj_pct: -12
    wacc_adj: 0.2
    market_sentiment_pct: -6
  rationale: 중국 브랜드의 국내 가전시장 진출은 과거 5년간 평균 15-20% 가격 경쟁 압박 유발. 프리미엄 브랜드 마진율 평균 2-3%p
    하락
- id: apac_lifestyle
  name: 아시아-태평양 라이프스타일 제품 성장
  category: company
  effects:
    growth_adj_pct: 10
    wacc_adj: -0.1
    market_sentiment_pct: 5
  rationale: APAC 지역 중산층 확대로 프리미엄 가전 수요 연 12-15% 성장. LG전자의 지역 내 시장점유율 15% 수준에서 성장
    여력 충분
- id: q1_record
  name: 1분기 역대 최고 실적
  category: company
  effects:
    growth_adj_pct: 8
    wacc_adj: -0.15
    market_sentiment_pct: 12
