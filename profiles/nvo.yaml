# ─── rNPV Parameters (PRIMARY METHOD) ───
valuation_method: "rnpv"

rnpv_params:
  r_and_d_cost: 0       # R&D already embedded in operating margin (41%); separate deduction = double-count
  discount_rate: null    # Use WACC
  decline_rate: 15.0     # Pharma patent cliff (biologics decline slower)
  default_margin: 0.41   # NVO 2025 operating margin ($19.3B / $46.8B)
  tax_rate: 0.22         # Danish effective rate
  pipeline:
    # ── Currently Marketed (approved) ──
    - name: "Ozempic (semaglutide T2D)"
      phase: "approved"
      indication: "Type 2 Diabetes"
      peak_sales: 24000     # Consensus $22-25B; global T2D expansion supports upper range
      years_to_peak: 2
      years_at_peak: 4
      patent_expiry_years: 12  # Key patents through ~2037
      existing_revenue: 19300
      launch_year_offset: 0

    - name: "Wegovy (semaglutide obesity)"
      phase: "approved"
      indication: "Obesity / Weight Management"
      peak_sales: 20000     # Capacity expansion + obesity TAM growth; consensus $20-25B
      years_to_peak: 3
      years_at_peak: 5
      patent_expiry_years: 13
      existing_revenue: 12500
      launch_year_offset: 0

    - name: "Rybelsus (oral semaglutide)"
      phase: "approved"
      indication: "Type 2 Diabetes (oral)"
      peak_sales: 4500      # Oral convenience premium; consensus $4-5B
      years_to_peak: 2
      years_at_peak: 4
      patent_expiry_years: 11
      existing_revenue: 3300
      launch_year_offset: 0

    - name: "Insulin & Legacy Portfolio"
      phase: "approved"
      indication: "Diabetes (insulin)"
      peak_sales: 8700      # Declining mature portfolio
      years_to_peak: 0
      years_at_peak: 2
      patent_expiry_years: 8
      existing_revenue: 8700
      launch_year_offset: 0

    # ── Pipeline (Late-stage) ──
    - name: "CagriSema (cagrilintide+semaglutide)"
      phase: "filed"
      indication: "Obesity / T2D"
      peak_sales: 11000     # Post-REDEFINE 1 miss, revised consensus $10-12B
      years_to_peak: 5
      years_at_peak: 6
      patent_expiry_years: 16
      success_prob: 0.80    # Filed with FDA (Dec 2025), slightly below 0.85 due to REDEFINE 1 miss
      launch_year_offset: 1

    - name: "Amycretin SC (GLP-1/amylin dual)"
      phase: "phase3"
      indication: "Obesity"
      peak_sales: 12000     # Next-gen, 22% weight loss in Ph2
      years_to_peak: 6
      years_at_peak: 6
      patent_expiry_years: 17
      launch_year_offset: 4

    - name: "Amycretin Oral"
      phase: "phase2"        # Still Phase 2 as of early 2026 (REDEFINE 6)
      indication: "Obesity (oral)"
      peak_sales: 8000      # Oral convenience premium, but lower efficacy
      years_to_peak: 7
      years_at_peak: 5
      patent_expiry_years: 17
      success_prob: 0.30    # Phase 2 + oral formulation risk
      launch_year_offset: 5

    # ── Early Pipeline ──
    - name: "Semaglutide NASH/MASH"
      phase: "phase3"
      indication: "NASH/MASH (liver)"
      peak_sales: 5000
      years_to_peak: 5
      years_at_peak: 5
      patent_expiry_years: 14
      launch_year_offset: 3

    - name: "Semaglutide Cardiovascular"
      phase: "phase3"
      indication: "Cardiovascular (label expansion)"
      peak_sales: 3000      # Label expansion, incremental revenue
      years_to_peak: 3
      years_at_peak: 4
      patent_expiry_years: 12
      success_prob: 0.85    # SELECT trial positive, ssBLA accepted
      launch_year_offset: 1

    - name: "Monlunabant (CB1 inverse agonist)"
      phase: "phase2"
      indication: "Obesity"
      peak_sales: 4000
      years_to_peak: 6
      years_at_peak: 5
      patent_expiry_years: 16
      launch_year_offset: 6

