# Valuation YAML profile template
# Copy this file to create a new company profile.

company:
  name: ""
  former_name: null
  legal_status: "비상장"          # "비상장" (unlisted) | "상장" (listed)
  parent_name: null
  parent_stake_pct: null
  shares_total: 0                 # Total shares issued
  shares_ordinary: 0              # Ordinary shares
  shares_preferred: 0             # Preferred shares (CPS, etc.)
  cps_conversion_shares: 0
  analysis_date: "2026-01-01"

segments:
  # SEGMENT_CODE:
  #   name: "Segment name"
  #   multiple: 0.0               # EV/EBITDA multiple

segment_data:
  # YEAR:
  #   SEGMENT_CODE: {revenue: 0, gross_profit: 0, op: 0, assets: 0}

consolidated:
  # YEAR:
  #   revenue: 0
  #   op: 0
  #   net_income: 0
  #   assets: 0
  #   liabilities: 0
  #   equity: 0
  #   dep: 0
  #   amort: 0
  #   gross_borr: 0
  #   net_borr: 0
  #   de_ratio: 0.0

wacc_params:
  rf: 3.50                        # Risk-free rate (%)
  erp: 7.00                       # Equity risk premium (%)
  bu: 0.750                       # Unlevered Beta
  de: 100.0                       # D/E Ratio (%)
  tax: 22.0                       # Corporate tax rate (%)
  kd_pre: 5.00                    # Pre-tax cost of debt (%)
  eq_w: 50.0                      # Equity weight (%)

scenarios:
  Base:
    name: "Base Case"
    prob: 50
    ipo: "N/A"
    irr: null
    dlom: 0
    cps_repay: 0
    rcps_repay: 0
    buyback: 0
    shares: 0                     # Applicable share count
    desc: ""
  Bull:
    name: "Bull Case"
    prob: 25
    ipo: "N/A"
    irr: null
    dlom: 0
    cps_repay: 0
    rcps_repay: 0
    buyback: 0
    shares: 0
    desc: ""
  Bear:
    name: "Bear Case"
    prob: 25
    ipo: "N/A"
    irr: null
    dlom: 20
    cps_repay: 0
    rcps_repay: 0
    buyback: 0
    shares: 0
    desc: ""

dcf_params:
  ebitda_growth_rates: [0.10, 0.08, 0.06, 0.05, 0.04]
  tax_rate: 22.0
  capex_to_da: 1.10
  nwc_to_rev_delta: 0.05
  terminal_growth: 2.5

# DDM parameters (for financials, optional)
# Used when valuation_method: "ddm" is set or financial sector is auto-detected
# ddm_params:
#   dps: 1000.0                   # Dividend per share (KRW or $)
#   dividend_growth: 3.0          # Dividend growth rate (%)

# rNPV parameters (for pharma/biotech pipeline valuation, optional)
# rnpv_params:
#   r_and_d_cost: 0            # Annual R&D cost (display units)
#   discount_rate: null         # Override WACC (%, null = use WACC)
#   decline_rate: 20.0          # Post-patent annual revenue decline (%)
#   pipeline:
#     - name: "Drug Name"
#       phase: "phase2"         # "preclinical" | "phase1" | "phase2" | "phase3" | "filed" | "approved"
#       indication: "Obesity"
#       peak_sales: 10000       # Estimated peak annual sales (display units)
#       years_to_peak: 5
#       years_at_peak: 5
#       patent_expiry_years: 15
#       success_prob: null       # Override PoS (0-1), null = use phase default
#       launch_year_offset: 2    # Years from base_year to launch
#       existing_revenue: 0      # Current revenue if already on market

cps_principal: 0
cps_years: 0
net_debt: 0
eco_frontier: 0
base_year: 2025

peers: []
  # - {name: "", segment_code: "", ev_ebitda: 0.0, notes: ""}
