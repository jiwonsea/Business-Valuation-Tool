news_drivers:
- id: ai_chip_competition
  name: Amazon AI chip competition intensification
  category: industry
  effects:
    growth_adj_pct: -15
    market_sentiment_pct: -8
  rationale: Major cloud provider entering AI chip market historically reduces incumbent
    margins by 10-20% (Intel vs AMD precedent). Amazon's scale creates credible competitive
    threat to NVIDIA's data center dominance.
- id: datacenter_expansion
  name: AI datacenter business expansion with partnerships
  category: company
  effects:
    growth_adj_pct: 25
    market_sentiment_pct: 12
  rationale: Strategic partnerships with infrastructure players typically accelerate
    revenue growth by 20-30% in semiconductor sector. Vera Rubin and Micron collaborations
    expand addressable market significantly.
- id: china_demand_surge
  name: Chinese AI enterprise demand acceleration
  category: industry
  effects:
    growth_adj_pct: 18
    market_sentiment_pct: 5
  rationale: $92M server demand signals broader Chinese AI investment cycle. Historical
    China tech cycles show 15-25% revenue impact for leading semiconductor suppliers
    during expansion phases.
- id: ai_technology_leadership
  name: AI technology leadership validation
  category: company
  effects:
    growth_adj_pct: 10
    wacc_adj: -0.3
    market_sentiment_pct: 8
  rationale: Expert validation of 2026 as 'game changer' year reduces execution risk
    premium. Technology leadership positions typically command 0.2-0.5%p WACC discount
    in semiconductor valuations.
- id: rate_environment
  name: Current interest rate environment
  category: macro
  effects:
    wacc_adj: 0.4
  rationale: Fed Funds at 3.64% vs historical tech sector average of 2.5%. 10Y Treasury
    at 4.29% requires WACC adjustment for current rate environment vs long-term assumptions.
