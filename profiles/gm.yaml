peers:
- name: Hyundai Motor Co (현대자동차)
  segment_code: SEG1
  ev_ebitda: 4.8
  notes: Korean OEM with global ICE/EV portfolio. North America significant revenue
    contributor. 2024 EBITDA margin ~8-9%, EV transition underway. Most comparable
    Korean peer by scale and NA exposure.
- name: Kia Corporation (기아)
  segment_code: SEG1
  ev_ebitda: 5.2
  notes: Korean OEM, strong EV lineup (EV6, Niro EV). NA market growing. Standalone
    valuation post-2020 separation. EBITDA margin ~7-8%. Direct EV/ICE mix comparable
    to GM NA segment.
- name: Ford Motor Company
  segment_code: SEG1
  ev_ebitda: 5.1
  notes: Direct NA automotive peer. ICE/EV transition in progress. 2024 EBITDA ~$8-9B
    on revenue ~$136B. Comparable margin pressure and EV capex intensity to GM NA.
- name: Stellantis NV
  segment_code: SEG1
  ev_ebitda: 5.9
  notes: Global OEM with significant NA operations (Jeep, Ram, Chrysler). 2024 EBITDA
    margin ~10-11%. Higher multiple reflects stronger pricing power and brand portfolio
    vs pure-play NA competitors.
- name: Toyota Motor Corporation (North America segment proxy)
  segment_code: SEG1
  ev_ebitda: 7.2
  notes: Premium multiple reflects superior operational efficiency, hybrid leadership,
    and NA profitability. 2024 EBITDA margin ~12-13%. Represents best-in-class NA
    automotive operations benchmark.
- name: Honda Motor Co (North America segment proxy)
  segment_code: SEG1
  ev_ebitda: 6.1
  notes: Japanese OEM with strong NA presence. EBITDA margin ~9-10%. Hybrid/EV transition
    progressing. Mid-range multiple reflects balanced ICE/EV portfolio and NA market
    position.
- name: Hyundai Motor Co (현대자동차)
  segment_code: SEG2
  ev_ebitda: 4.8
  notes: Korean OEM with global operations including China/Europe. 2023 EBITDA ~3.2조원,
    Market cap ~35조원. Most comparable scale and international exposure to GM's automotive
    segment.
- name: Kia Corporation (기아)
  segment_code: SEG2
  ev_ebitda: 5.2
  notes: Korean OEM with significant China/Europe presence. 2023 EBITDA ~1.8조원, Market
    cap ~9.5조원. Similar business model to Hyundai with international diversification.
- name: Volkswagen Group (독일)
  segment_code: SEG2
  ev_ebitda: 6.5
  notes: Direct peer in Europe/China automotive. 2023 EBITDA ~€18B (~27조원), Market
    cap ~175조원. Largest European OEM with comparable international structure.
- name: BMW Group (독일)
  segment_code: SEG2
  ev_ebitda: 7.1
  notes: Premium OEM with global operations. 2023 EBITDA ~€15B (~22.5조원), Market cap
    ~160조원. Strong China/Europe presence, comparable to GM's international segment
    profitability.
- name: Daimler-Benz/Mercedes-Benz Group (독일)
  segment_code: SEG2
  ev_ebitda: 6.8
  notes: Premium global OEM. 2023 EBITDA ~€18B (~27조원), Market cap ~180조원. Significant
    China/Europe operations matching GM's international footprint.
- name: Geely-Volvo (중국/스웨덴)
  segment_code: SEG2
  ev_ebitda: 5.5
  notes: Chinese-Swedish OEM with Europe/China dual presence. 2023 EBITDA ~$3B (~4조원),
    Market cap ~8조원. Direct structural similarity to GM's international segment model.
- name: BYD Co Ltd (중국)
  segment_code: SEG2
  ev_ebitda: 8.2
  notes: Chinese OEM with growing international presence. 2023 EBITDA ~¥80B (~1.5조원),
    Market cap ~15조원. Represents emerging market OEM comparable to GM's China operations.
- name: Hyundai Capital Co., Ltd.
  segment_code: SEG3
  ev_ebitda: 8.5
  notes: Korean automotive captive finance leader. Direct peer to GM Financial. KOSPI
    listed. 2023 EBITDA ~1.2T KRW, Market cap ~9.8T KRW. Similar loan portfolio, lease,
    and insurance operations.
- name: KB Financial Group Inc.
  segment_code: SEG3
  ev_ebitda: 9.2
  notes: Korean financial services conglomerate with auto finance subsidiary. KOSPI
    listed. 2023 EBITDA ~2.8T KRW. Broader financial services but significant auto
    lending exposure.
- name: Ally Financial Inc. (ALLY)
  segment_code: SEG3
  ev_ebitda: 7.8
  notes: US-listed pure-play auto finance and insurance. Direct structural peer to
    GM Financial. 2023 EBITDA ~4.2B USD (~5.5T KRW). Captive and non-captive lending,
    insurance products.
- name: Ford Motor Credit Company (Ford Credit - Private)
  segment_code: SEG3
  ev_ebitda: 8.2
  notes: Captive finance subsidiary of Ford. Not independently listed but comparable
    multiples derived from Ford Credit debt spreads and industry reports. Similar
    scale and business model to GM Financial.
- name: Toyota Financial Services (Private)
  segment_code: SEG3
  ev_ebitda: 9.5
  notes: Toyota's captive finance arm. Private but multiples estimated from Toyota
    Financial Services bond yields and industry benchmarks. Largest captive finance
    globally. Lease, loan, and insurance operations.
- name: LG Financial Co., Ltd.
  segment_code: SEG3
  ev_ebitda: 8.8
  notes: Korean automotive and consumer finance company. KOSDAQ listed. 2023 EBITDA
    ~0.8T KRW. Auto loans, leases, and insurance products. Smaller scale but similar
    business structure.
- name: Tesla Inc
  segment_code: SEG4
  ev_ebitda: 45.0
  notes: Global leader in EV + autonomous software/services. Premium valuation reflects
    software/services revenue mix. 2023 EV/EBITDA ~45x (market cap $800B+, EBITDA
    ~$18B). Direct comparable for Cruise autonomous platform.
- name: Waymo (Alphabet subsidiary)
  segment_code: SEG4
  ev_ebitda: null
  notes: Pure-play autonomous vehicle technology. Not independently listed; Alphabet
    trades at ~20-25x EV/EBITDA (2023). Waymo segment valuation estimated $30-40B
    internally. Highly similar business structure to Cruise.
- name: Mobileye (Intel subsidiary, formerly MBLY)
  segment_code: SEG4
  ev_ebitda: 35.0
  notes: Autonomous driving software/chips. IPO 2023 at $16B valuation; acquired back
    by Intel 2024. Last public EV/EBITDA ~35x. Direct peer for OnStar/connected services
    software stack.
- name: Aptiv PLC (APTV)
  segment_code: SEG4
  ev_ebitda: 12.0
  notes: Automotive software/autonomous platform provider. 2023 EV/EBITDA ~12x (market
    cap $15B, EBITDA ~$1.3B). Lower multiple reflects mixed legacy hardware exposure
    vs. pure software.
- name: Aurora Innovation (AUR)
  segment_code: SEG4
  ev_ebitda: null
  notes: SPAC-listed autonomous trucking. Market cap ~$2-3B (2023-2024), EBITDA negative.
    Not suitable for multiple-based valuation; included for business model reference
    only.
- name: Hyundai Mobis (012330.KS)
  segment_code: SEG4
  ev_ebitda: 8.5
  notes: Korean automotive supplier with growing autonomous/connected services division.
    2023 EV/EBITDA ~8.5x (market cap ~8.5T KRW, EBITDA ~1T KRW). Lower multiple reflects
    hardware-heavy portfolio; software segment growing.
- name: SK Telecom (017670.KS)
  segment_code: SEG4
  ev_ebitda: 6.0
  notes: Korean telecom with connected car/5G autonomous platform (T-map, autonomous
    driving partnerships). 2023 EV/EBITDA ~6x. Lower multiple reflects telecom core
    business; autonomous segment emerging.
- name: Naver (035420.KS)
  segment_code: SEG4
  ev_ebitda: 18.0
  notes: Korean tech with mapping (Naver Map) and autonomous vehicle software partnerships.
    2023 EV/EBITDA ~18x (market cap ~40T KRW, EBITDA ~2.2T KRW). Software-focused
    valuation closer to Cruise model.
